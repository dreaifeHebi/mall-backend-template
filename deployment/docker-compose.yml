services:
  postgres:
    image: postgres:16-alpine
    container_name: mall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mall}
      POSTGRES_USER: ${POSTGRES_USER:-mall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mall} -d ${POSTGRES_DB:-mall}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mall-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:?set REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mall-admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: mall-admin
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mall}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mall}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      MALL_UPLOAD_PATH: ${MALL_UPLOAD_PATH:-/data/uploads}
      MALL_UPLOAD_URL: ${MALL_UPLOAD_URL:-/uploads}
    ports:
      - "${ADMIN_PORT:-8080}:8080"
    volumes:
      - uploads_data:${MALL_UPLOAD_PATH:-/data/uploads}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mall-portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    container_name: mall-portal
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mall}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mall}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      MALL_UPLOAD_PATH: ${MALL_UPLOAD_PATH:-/data/uploads}
      MALL_UPLOAD_URL: ${MALL_UPLOAD_URL:-/uploads}
    ports:
      - "${PORTAL_PORT:-8085}:8085"
    volumes:
      - uploads_data:${MALL_UPLOAD_PATH:-/data/uploads}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
