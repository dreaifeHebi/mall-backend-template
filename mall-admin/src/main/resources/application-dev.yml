spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mall}
    username: ${SPRING_DATASOURCE_USERNAME:mall}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    druid:
      initial-size: 5 #连接池初始化大小
      min-idle: 10 #最小空闲连接数
      max-active: 20 #最大连接数
      web-stat-filter:
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*" #不统计这些请求数据
      stat-view-servlet: #访问监控网页的登录用户名和密码
        login-username: druid
        login-password: druid
  redis:
    host: localhost # Redis服务器地址
    database: 0 # Redis数据库索引（默认为0）
    port: 6379 # Redis服务器连接端口
    password: # Redis服务器连接密码（默认为空）
    timeout: 300ms # 连接超时时间（毫秒）
  mail:
    host: email-smtp.us-west-1.amazonaws.com   # AWS SES SMTP 终端节点
    port: 587 # SMTP服务器端口
    username: ${SES_SMTP_USERNAME}             # 从 SES 获取的 SMTP 用户名
    password: ${SES_SMTP_PASSWORD}             # 从 SES 获取的 SMTP 密码
    protocol: smtp
    from: ${SPRING_MAIL_FROM:mall@example.com}         # 发送邮箱地址
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000
    default-encoding: UTF-8

# 自动取消未支付订单超时（分钟）
order:
  timeout:
    minutes: 1440

mall:
  email:
    enable: true # 启用邮件发送
    mode: prod   # 生产模式

logging:
  level:
    root: info
    com.macro.mall: debug

# GlobePay配置
globepay:
  base-url: https://pay.globepay.co.jp
  partner-code: ${GLOBEPAY_PARTNER_CODE:}
  credential-code: ${GLOBEPAY_CREDENTIAL_CODE:}
  notify-url: http://localhost:8080/admin/globepay/callback/notify
  redirect-url: http://localhost:8080/admin/globepay/callback/success
  credit-card-return-url: http://localhost:8080/admin/globepay/callback/credit-card-return
  default-currency: JPY
  sign-valid-minutes: 5
