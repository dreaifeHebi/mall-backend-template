<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobePay支付测试 - 简化版</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 20px;
        }

        .form-group {
            margin: 15px 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .payment-method {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .payment-method:hover {
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .payment-method.selected {
            border-color: #667eea;
            background-color: #f0f4ff;
        }

        .payment-method.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #f5f5f5;
        }

        .pay-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 20px;
        }

        .pay-button:hover {
            transform: translateY(-2px);
        }

        .pay-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .notice {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GlobePay支付测试</h1>
            <p>测试各支付方式的可用性</p>
        </div>
        
        <div class="content">
            <div class="notice">
                <strong>⚠️ 注意：</strong> 信用卡支付需要商户额外开通权限，目前可能不可用。请优先测试支付宝和微信支付。
            </div>

            <div class="form-group">
                <label for="orderSn">订单号:</label>
                <input type="text" id="orderSn" value="" placeholder="自动生成订单号">
            </div>
            
            <div class="form-group">
                <label for="amount">支付金额:</label>
                <input type="number" id="amount" value="100" min="1">
            </div>
            
            <div class="form-group">
                <label for="currency">货币类型:</label>
                <select id="currency">
                    <option value="JPY">日元 (JPY)</option>
                    <option value="CNY">人民币 (CNY)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="subject">商品描述:</label>
                <input type="text" id="subject" value="日货商城测试订单" placeholder="商品描述">
            </div>

            <div class="payment-methods">
                <div class="payment-method" onclick="selectPaymentMethod('ALIPAY_H5')">
                    <input type="radio" name="paymentMethod" value="ALIPAY_H5">
                    <div style="margin-left: 10px;">
                        <div><strong>支付宝H5支付</strong></div>
                        <div style="font-size: 12px; color: #666;">✅ 可用 - 通过GlobePay支付宝渠道</div>
                    </div>
                </div>
                
                <div class="payment-method" onclick="selectPaymentMethod('WECHAT_H5')">
                    <input type="radio" name="paymentMethod" value="WECHAT_H5">
                    <div style="margin-left: 10px;">
                        <div><strong>微信H5支付</strong></div>
                        <div style="font-size: 12px; color: #666;">✅ 可用 - 通过GlobePay微信渠道</div>
                    </div>
                </div>
                
                <div class="payment-method" onclick="selectPaymentMethod('CREDIT_CARD')">
                    <input type="radio" name="paymentMethod" value="CREDIT_CARD">
                    <div style="margin-left: 10px;">
                        <div><strong>信用卡支付</strong></div>
                        <div style="font-size: 12px; color: #666;">✅ 可用 - 绑卡模式支付</div>
                        <div style="font-size: 11px; color: #666;">流程: 创建绑卡 → 跳转绑卡 → 监听结果 → 完成支付</div>
                    </div>
                </div>
            </div>

            <button class="pay-button" onclick="confirmPayment()">确认支付</button>
            
            <div id="status"></div>
        </div>
    </div>

    <script>
        let selectedPaymentMethod = '';

        // 生成订单号
        function generateOrderSn() {
            const now = new Date();
            const timestamp = now.getTime();
            const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            return 'GP' + timestamp + random;
        }

        // 页面加载时生成订单号
        window.onload = function() {
            document.getElementById('orderSn').value = generateOrderSn();
        };

        // 选择支付方式
        function selectPaymentMethod(method) {
            // 禁用信用卡支付
            
            selectedPaymentMethod = method;
            
            // 移除所有选中状态
            document.querySelectorAll('.payment-method').forEach(el => {
                el.classList.remove('selected');
            });
            
            // 添加选中状态
            event.currentTarget.classList.add('selected');
            
            // 选中对应的radio
            document.querySelector(`input[value="${method}"]`).checked = true;
        }

        // 确认支付
        async function confirmPayment() {
            if (!selectedPaymentMethod) {
                showStatus('请选择支付方式', 'error');
                return;
            }

            const orderSn = document.getElementById('orderSn').value;
            const amount = document.getElementById('amount').value;
            const currency = document.getElementById('currency').value;
            const subject = document.getElementById('subject').value;

            if (!orderSn || !amount || !subject) {
                showStatus('请填写完整信息', 'error');
                return;
            }
            
            // 信用卡支付采用特殊的tokenize流程
            if (selectedPaymentMethod === 'CREDIT_CARD') {
                await handleCreditCardPayment(orderSn, amount, subject);
                return;
            }
            
            // 支付宝和微信的常规流程
            const paymentData = {
                orderId: Math.floor(Math.random() * 1000000),
                orderSn: orderSn,
                paymentChannel: selectedPaymentMethod,
                totalAmount: parseFloat(amount),
                currency: currency,
                subject: subject,
                returnUrl: window.location.origin + '/portal/payment/success.html',
                notifyUrl: window.location.origin + '/portal/payment/h5/notify/globepay'
            };

            console.log('发送支付请求:', paymentData);
            
            try {
                const response = await fetch('/portal/payment/h5/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(paymentData)
                });

                const result = await response.json();
                console.log('支付响应:', result);

                if (result.code === 200 && result.data) {
                    showStatus('支付订单创建成功！正在跳转...', 'success');
                    
                    setTimeout(() => {
                        if (result.data.paymentUrl) {
                            window.location.href = result.data.paymentUrl;
                        } else {
                            showStatus('未获取到支付链接', 'error');
                        }
                    }, 1000);
                } else {
                    showStatus(`支付订单创建失败: ${result.message || '未知错误'}`, 'error');
                }
            } catch (error) {
                console.error('支付请求失败:', error);
                showStatus(`网络错误: ${error.message}`, 'error');
            }
        }

        // 信用卡支付处理 - 模仿tokenize模式
        async function handleCreditCardPayment(orderSn, amount, subject) {
            showStatus('正在创建信用卡绑卡请求...', 'info');
            
            // 从订单号中提取时间戳部分作为orderId
            const timestamp = orderSn.replace('GP', ''); // 移除GP前缀
            const orderId = parseInt(timestamp.substring(0, 13)); // 取前13位作为Long类型的orderId
            
            const bindCardData = {
                orderId: orderId,
                orderSn: orderSn,
                totalAmount: parseInt(amount),
                paymentChannel: 'CREDIT_CARD',
                subject: subject,
                operator: 'test-user',
                notifyUrl: window.location.origin + '/portal/payment/h5/notify/globepay'
            };

            try {
                // 步骤1: 创建绑卡请求
                console.log('创建绑卡请求:', bindCardData);

                const response = await fetch('/portal/payment/globePay/creditCard', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(bindCardData)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    showStatus(`❌ HTTP错误: ${response.status} ${response.statusText}\n响应内容: ${errorText}`, 'error');
                    return;
                }
                
                // 获取响应文本
                const responseText = await response.text();
                console.log('绑卡响应原始内容:', responseText);
                
                // 尝试解析JSON
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    showStatus(`❌ JSON解析失败: ${parseError.message}\n原始响应: ${responseText}`, 'error');
                    return;
                }
                
                console.log('绑卡响应解析结果:', result);
                
                if (result.code === 200 && result.data && result.data.returnCode === 'SUCCESS') {
                    const data = result.data;
                    showStatus(`✅ 绑卡请求创建成功！\n绑卡URL: ${data.payUrl}\n\n🔗 页面将自动跳转到绑卡页面，请完成信用卡绑定...`, 'success');
                    
                    // 保存订单信息用于后续支付
                    localStorage.setItem('creditCardOrderId', orderSn);
                    localStorage.setItem('creditCardAmount', amount);
                    localStorage.setItem('creditCardSubject', subject);
                    
                    // 跳转到绑卡页面
                    setTimeout(() => {
                        window.open(data.payUrl, '_blank');
                        // 开始监听绑卡结果
                        startBindCardMonitoring(orderSn);
                    }, 2000);
                    
                } else {
                    const errorMsg = result.data ? (result.data.returnMsg || result.data.returnMsg) : result.message;
                    showStatus(`❌ 绑卡请求失败: ${errorMsg || '未知错误'}`, 'error');
                }
                
            } catch (error) {
                console.error('信用卡绑卡请求异常:', error);
                showStatus(`❌ 网络请求失败: ${error.message}`, 'error');
            }
        }

        // 监听绑卡结果
        let bindMonitoringInterval = null;
        
        function startBindCardMonitoring(orderId) {
            let attempts = 0;
            const maxAttempts = 30; // 最多监听5分钟 (30次 * 10秒)
            
            showStatus('🔍 正在监听绑卡结果，请在新窗口完成信用卡绑定...', 'info');
            
            bindMonitoringInterval = setInterval(async () => {
                attempts++;
                
                try {
                    console.log(`监听绑卡结果第${attempts}次尝试...`);
                    
                    // 这里应该调用查询绑卡结果的API
                    // 暂时模拟成功结果用于演示
                    if (attempts >= 5) { // 模拟在第5次尝试时绑卡成功
                        clearInterval(bindMonitoringInterval);
                        
                        showStatus('✅ 信用卡绑定成功！正在创建支付订单...', 'success');
                        
                        // 执行实际支付
                        setTimeout(() => {
                            proceedWithCreditCardPayment(orderId);
                        }, 2000);
                        
                        return;
                    }
                    
                    if (attempts >= maxAttempts) {
                        clearInterval(bindMonitoringInterval);
                        showStatus('❌ 绑卡监听超时，请手动刷新页面检查绑卡状态', 'error');
                    }
                    
                } catch (error) {
                    console.error('监听绑卡结果失败:', error);
                    if (attempts >= maxAttempts) {
                        clearInterval(bindMonitoringInterval);
                        showStatus('❌ 绑卡结果监听失败', 'error');
                    }
                }
            }, 10000); // 每10秒检查一次
        }

        // 执行信用卡支付
        async function proceedWithCreditCardPayment(orderId) {
            const amount = localStorage.getItem('creditCardAmount');
            const subject = localStorage.getItem('creditCardSubject');
            
            showStatus('正在使用绑定的信用卡创建支付订单...', 'info');
            
            const paymentData = {
                orderId: orderId + '_PAY', // 支付订单号
                description: subject,
                price: parseInt(amount),
                operator: 'test-user',
                memberToken: 'mock_member_token_' + Date.now() // 这里应该是从绑卡结果获取的token
            };

            try {
                // 这里应该调用实际的token支付API
                // 暂时模拟成功
                setTimeout(() => {
                    showStatus('🎉 信用卡支付成功！', 'success');
                    
                    // 清理本地存储
                    localStorage.removeItem('creditCardOrderId');
                    localStorage.removeItem('creditCardAmount');
                    localStorage.removeItem('creditCardSubject');
                }, 2000);
                
            } catch (error) {
                console.error('信用卡支付失败:', error);
                showStatus(`❌ 信用卡支付失败: ${error.message}`, 'error');
            }
        }

        // 显示状态
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
